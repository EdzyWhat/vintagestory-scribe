name: CI

# Build and test the game-agnostic Core on every push and pull request.
# GitHub's cloud runners have no Vintage Story install, so CI covers Core (and its
# tests) only — the game DLLs are not redistributable. The full Mod project is compiled
# locally against a real game install. See README.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core.Tests
        run: dotnet restore tests/Core.Tests/Core.Tests.csproj

      - name: Build Core.Tests
        run: dotnet build tests/Core.Tests/Core.Tests.csproj --configuration Release --no-restore

      - name: Test Core
        run: dotnet test tests/Core.Tests/Core.Tests.csproj --configuration Release --no-build --verbosity normal
